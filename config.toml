baseURL = "https://xxkizashi.github.io/blank-space/"
DefaultContentLanguage = "ja"
languageCode = "ja-jp"
title = "Blank Space"
theme = "Mainroad"
paginate = 10
hasCJKLanguage = true
publishDir = "docs"
canonifyurls = true
summaryLength = 120
googleAnalytics = ""

[Author]
  name = "xxkizashi"

[Params]
  description = "xxkizashi's personal blog about everything"
  twitter_cards = false
  readmore = true
  authorbox = true
  pager = true
  mathjax = true
  post_meta = ["date", "categories"] # Order of post meta information
  customCSS = ["css/custom-font.css"] # Include custom CSS files
  customJS = ["js/custom.js"] # Include custom JS files

[Params.logo]
  subtitle = "No Attach No Chance"

[Params.sidebar]
  home = "right"   # Configure layout for home page
  list = "right"   # Configure layout for list pages
  single = "right" # Configure layout for single pages
  widgets = ["search", "recent", "categories", "taglist", "social"]

[Params.widgets]
  recent_num = 5 # Set the number of articles in the "Recent articles" widget
  tags_counter = false # Enable counter for each tag in "Tags" widget (disabled by default)

[params.widgets.social]
  rss            = true 
  twitter        = "https://twitter.com/xxKFZ1S"
  github         = "https://github.com/xxkizashi"

[[Menus.main]]
  Name = "Home"
  URL = "/"

[[Menus.main]]
  Name = "Posts"
  URL = "/posts/"